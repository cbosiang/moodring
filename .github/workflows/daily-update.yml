name: GRISI Daily Update

on:
  schedule:
    - cron: '0 14 * * 1-5'  # 22:00 Beijing/Taipei time (UTC+8)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy FinMind requests
      - name: Run daily update
        run: python src/daily_update.py
      - name: Sync data to docs
        run: |
          mkdir -p docs/data
          cp data/*.json docs/data/
      - name: Commit and push
        run: |
          git config user.name "GRISI Bot"
          git config user.email "grisi-bot@users.noreply.github.com"
          git add data/ docs/data/
          git diff --staged --quiet || git commit -m "data: daily update $(date +%Y-%m-%d)"
          git push
